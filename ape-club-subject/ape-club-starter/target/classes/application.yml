server:
  port: 3010

spring:
  profiles:
    active: dev
  datasource:
    username: ${jc.datasource.username}
    password: ${jc.datasource.password}
    driver-class-name: ${jc.datasource.driver-class-name}
    url: jdbc:mysql://${jc.datasource.host}:${jc.datasource.port}/${jc.datasource.database}?serverTimezone=Asia/Shanghai&useUnicode=true/characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true
    type: ${jc.datasource.type}
    druid:
      initial-size: 20  # 初始化连接池大小
      min-idle: 20      # 最小空闲连接数
      connectionProperties: config.decrypt=true;config.decrypt.key=${publicKey};  # 连接属性，包括解密配置和公钥
      max-active: 100   # 最大活跃连接数
      max-wait: 60000   # 获取连接的最大等待时间（毫秒）
      stat-view-servlet:
        enabled: true    # 是否启用Druid监控页面
        url-pattern: ${jc.datasource.druid.url-pattern}  # Druid监控页面的URL路径
        login-username: ${jc.datasource.druid.login-username}  # 登录Druid监控页面的用户名
        login-password: ${jc.datasource.druid.login-password}  # 登录Druid监控页面的密码
        filter:
          stat:
            enabled: true  # 启用统计过滤器
            slow-sql-millis: 2000  # 设置慢查询阈值为2000毫秒
            log-slow-sql: true  # 记录慢查询日志
          wall: # 定义防火墙过滤器
            enabled: true  # 启用防火墙过滤器
          config: # 定义配置过滤器
            enabled: true  # 启用配置过滤器
  redis:
    # Redis数据库索引（默认为0）
    database: 0
    # Redis服务器地址
    host: localhost
    # Redis服务器连接端口
    port: 6379
    # Redis服务器连接密码（默认为空）
    password:
    # 连接超时时间
    timeout: 2s
    lettuce:
      pool:
        # 连接池最大连接数
        max-active: 200
        # 连接池最大阻塞等待时间（使用负值表示没有限制）
        max-wait: -1ms
        # 连接池中的最大空闲连接
        max-idle: 10
        # 连接池中的最小空闲连接
        min-idle: 0

server:
  port: 3015
spring:
  output:
    ansi:
      enabled: ALWAYS
  datasource:
    username: root
    password: 2003
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/jc-club-init?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf8&useSSL=false
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: 20
      min-idle: 20
      #      connectionProperties: config.decrypt=true;config.decrypt.key=${publicKey};
      max-active: 100
      max-wait: 60000
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*
        login-username: admin
        login-password: 123456
      filter:
        stat:
          enabled: true
          slow-sql-millis: 2000
          log-slow-sql: true
        wall:
          enabled: true
        config:
          enabled: true
  redis:
    # Redis数据库索引（默认为0）
    database: 1
    # Redis服务器地址
    host: localhost
    # Redis服务器连接端口
    port: 6379
    # Redis服务器连接密码（默认为空）
    password:
    # 连接超时时间
    timeout: 2s
    lettuce:
      pool:
        # 连接池最大连接数
        max-active: 200
        # 连接池最大阻塞等待时间（使用负值表示没有限制）
        max-wait: -1ms
        # 连接池中的最大空闲连接
        max-idle: 10
        # 连接池中的最小空闲连接
        min-idle: 0
#publicKey: MFwwDQYJKoZIhvcNAQEBBQADSwAwSAJBAMJzo9TiSuOGAMR2Zma25lWdtR1oxq6RcZYnWE9vcYLNKxUOkBlvSfMrbS25KtlJi+hIzikfCoyTDB0VI5gB3Q8CAwEAAQ==
  mvc:
    async:
      request-timeout: 600000
logging:
  config: classpath:log4j2-spring.xml

interview:
  file-base-url: http://localhost:5000
  ai:
    endpoint: https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions
    model: qvq-max-2025-03-25
    api-key: ${DASHSCOPE_API_KEY:sk-ab132767927a4c7ca4959af611dab414}
    question-count: 4
    parallelism: 3
    prompt:
      question-system: >
        你是一名资深技术面试官。请围绕给定关键词生成一条真实、简洁、适合口头追问的面试题，并给出精炼、可面试复盘用的参考答案。
        只能返回 JSON，不要返回 markdown、解释说明或多余文本。
      question-user-template: >
        请围绕关键词“%s”生成 1 道面试题。
        返回 JSON：{"labelName":"标签名称","subjectName":"题目内容","subjectAnswer":"参考答案"}
      score-system: >
        你是一名严谨的技术面试官。请根据题目和候选人回答进行评分，并给出参考答案。
        只能返回 JSON，不要返回 markdown、解释说明或多余文本。
      score-user-template: >
        请根据下面信息完成评分，满分 5 分，可保留 1 位小数。
        题目：%s
        候选人回答：%s
        返回 JSON：{"userScore":4.5,"subjectAnswer":"参考答案简述"}
